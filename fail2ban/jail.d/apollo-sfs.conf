[nginx-api-scan]
enabled  = true
filter   = nginx-api-scan
logpath  = /var/log/nginx/access.log

# Ban after 10 hits to non-existent API routes within 60 seconds.
# Legitimate clients virtually never hit a 404 on /api/ repeatedly.
maxretry = 10
findtime = 60

# Ban for 7 days. Scanners rarely come back after a long ban but adjust
# downward if you want shorter bans with more re-evaluation.
bantime  = 7d

action   = nginx-blocklist
