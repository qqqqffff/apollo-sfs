# When the client sends an Upgrade header (WebSocket), pass Connection: upgrade;
# otherwise send Connection: close so regular HTTP proxying is unaffected.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name apollo-sfs.com;

    # ── TLS — Cloudflare Origin Certificate ───────────────────────────────────
    # Generate at: Cloudflare Dashboard → SSL/TLS → Origin Server → Create Certificate
    # Set SSL/TLS mode to Full (Strict) in Cloudflare so the edge always
    # validates this cert against the origin.
    ssl_certificate     /etc/ssl/cloudflare/origin.crt;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── IP blocklist ──────────────────────────────────────────────────────────
    # Drop connections from explicitly blocked IPs.
    # Add deny rules to files under /etc/nginx/blocklist.d/ e.g.:
    #   deny 1.2.3.4;
    #   deny 10.0.0.0/8;
    include /etc/nginx/blocklist.d/*.conf;

    # ── GeoIP — US-only access ────────────────────────────────────────────────
    # 444 = close connection with no response, leaving bots/scanners in the dark.
    if ($geoip2_country_code != "US") {
        return 444;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Restrict what content the browser may load or execute.
    # - script-src 'self': only scripts from this origin (no CDN, no eval)
    # - style-src 'self' 'unsafe-inline': Tailwind and component inline styles
    # - img-src 'self' data: blob:: previewed images + mammoth base64 embeds
    # - frame-src 'self': PDF/text iframes served from the same origin
    # - media-src 'self': video/audio streaming endpoint
    # - connect-src 'self': XHR/fetch for API calls
    # - object-src 'none': block Flash and other plugins entirely
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; frame-src 'self'; media-src 'self'; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # ── React SPA — proxied to the frontend container ─────────────────────────
    # Caching and try_files are handled by the container's nginx config.
    location / {
        proxy_pass http://127.0.0.1:3000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # ── API proxy → Go container ───────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8080;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (used by /api/v1/admin/system/metrics/stream).
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Do not buffer request bodies — stream uploads directly to the Go API
        # so large files don't need to land on disk twice.
        proxy_request_buffering off;

        # Generous timeouts for large file uploads and downloads.
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
        proxy_connect_timeout 10s;

        # Allow uploads up to 500 MB. Adjust to match the per-user quota ceiling.
        client_max_body_size 500M;

        # Per-chunk read timeout: resets on every received body chunk, so a slow
        # but active upload will never be dropped. 3600s covers even the worst
        # real-world connections without timing out legitimate uploads.
        client_body_timeout 3600s;

        # ── Auth endpoints — rate limited ──────────────────────────────────────
        # 10 req/min per IP, burst of 10. Supplements Keycloak's brute-force
        # detection as a first line of defence at the network edge.
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;

            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 1M;
        }
    }
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name apollo-sfs.com;
    return 301 https://$host$request_uri;
}
