[Definition]
# Match requests to /api/ routes that return 404. These are the fingerprint of
# scanners and enumeration tools probing for endpoints that do not exist.
#
# Nginx log format (from nginx.conf):
#   $remote_addr - $remote_user [$time_local] "$request" $status ...
# After real_ip_module is configured (CF-Connecting-IP), $remote_addr is the
# real client IP, so <HOST> correctly captures the actual attacker.
failregex = ^<HOST> - \S* \[.+?\] "\w+ /api/\S* HTTP/\S+" 404

ignoreregex =
