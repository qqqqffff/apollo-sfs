server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Vite content-hashed assets — cache for 1 year (immutable)
    location ~* ^/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA catch-all — let React Router handle all non-asset paths
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
