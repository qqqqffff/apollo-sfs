name: apollo-sfs

# All services run on app-network (internal Docker bridge).
# Only the API port is bound to 127.0.0.1 so Nginx on the host can proxy to it.
#
# MinIO is the only service whose data is bind-mounted to the NVMe drive.
# Create that directory before running `docker compose up` for the first time:
#
#   sudo mkdir -p /minio/nvme-1/data
#
# All other persistent data (PostgreSQL, Maddy) uses standard named Docker volumes
# managed under the Docker data root (/minio/nvme-1/docker if you've moved it there).
#
# Place the Keycloak realm import JSON at ./keycloak/import/realm-export.json
# before first boot — Keycloak imports it once, then skips on subsequent starts.

services:

  # ── App API ────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: apollo-sfs-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      # PostgreSQL — app DB
      POSTGRES_APP_HOST: db-app
      POSTGRES_APP_PORT: 5432
      POSTGRES_APP_USER: ${POSTGRES_APP_USER}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD}
      POSTGRES_APP_DB: ${POSTGRES_APP_DB}
      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
      MINIO_USE_SSL: "false"
      # Keycloak
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_INTERNAL_URL: http://keycloak:8180
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # Encryption
      KEY_ENCRYPTION_KEY: ${KEY_ENCRYPTION_KEY}
      # Cookies & session
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      TOKEN_REFRESH_THRESHOLD: ${TOKEN_REFRESH_THRESHOLD:-60}
      APP_BASE_URL: ${APP_BASE_URL}
      # Email — Maddy submission point (internal Docker only)
      MADDY_INTERNAL_HOST: maddy:587
      MAIL_FROM: ${MAIL_FROM}
      MAIL_DOMAIN: ${MAIL_DOMAIN}
      QUOTA_WARNING_THRESHOLD_PERCENT: ${QUOTA_WARNING_THRESHOLD_PERCENT:-80}
    depends_on:
      db-app:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      minio:
        condition: service_healthy
      maddy:
        condition: service_started
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── MinIO object storage ───────────────────────────────────────────────────
  # Encrypted file blobs are stored here. Data is bind-mounted directly to the
  # NVMe drive at /minio/nvme-1/data so uploaded files land on fast storage.
  # Port 9000 is internal only — accessed by the API on the Docker network.
  # Port 9001 (MinIO console) is NOT exposed to the host; access via SSH tunnel
  # during setup if needed: ssh -L 9001:localhost:9001 <pi>
  minio:
    image: minio/minio:latest
    container_name: apollo-sfs-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Keycloak auth server ───────────────────────────────────────────────────
  # Never exposed publicly — the API communicates with it on the internal network.
  # Realm import: place realm JSON files in ./keycloak/import/ before first boot.
  keycloak:
    image: quay.io/keycloak/keycloak:26
    container_name: apollo-sfs-keycloak
    restart: unless-stopped
    command: start --import-realm
    environment:
      # Database backend
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db-keycloak:5432/${POSTGRES_KC_DB}
      KC_DB_USERNAME: ${POSTGRES_KC_USER}
      KC_DB_PASSWORD: ${POSTGRES_KC_PASSWORD}
      # HTTP (TLS terminated by Nginx on the host)
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 8180
      KC_HTTPS_ENABLED: "false"
      # Hostname — must match the public-facing domain so token issuers are correct
      KC_HOSTNAME: ${COOKIE_DOMAIN}
      KC_HOSTNAME_STRICT: "false"
      # Trust X-Forwarded-* headers set by Nginx
      KC_PROXY_HEADERS: xforwarded
      # Bootstrap admin credentials (Keycloak 26+)
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # Limit JVM heap — important on a memory-constrained Pi
      JAVA_OPTS_APPEND: -Xms256m -Xmx512m
    volumes:
      # Realm JSON files are imported on first boot, then skipped if realm exists
      - ./keycloak/import:/opt/keycloak/data/import:ro
    depends_on:
      db-keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8180/health/ready"]
      interval: 30s
      timeout: 15s
      retries: 5
      # Keycloak JVM startup is slow — give it time before marking unhealthy
      start_period: 90s
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Maddy SMTP ─────────────────────────────────────────────────────────────
  # Internal submission hub only — accepts mail from the API and Keycloak on
  # port 587, then relays outbound through SendGrid. Never exposed to the host.
  # Mount your maddy.conf at ./maddy/maddy.conf before starting.
  maddy:
    image: foxcpp/maddy:latest
    container_name: apollo-sfs-maddy
    restart: unless-stopped
    volumes:
      - ./docker/maddy:/data
      - ./maddy/maddy.conf:/etc/maddy/maddy.conf:ro
    networks:
      - app-network
    environment:
      SENDGRID_SMTP_PASSWORD: ${SENDGRID_SMTP_PASSWORD}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Cloudflare DDNS ────────────────────────────────────────────────────────
  # Polls your public IP every 5 minutes and updates the Cloudflare A record.
  # Uses a scoped API token with DNS-edit-only permission (never full zone access).
  ddns:
    image: favonia/cloudflare-ddns:latest
    container_name: apollo-sfs-ddns
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      CF_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      DOMAINS: ${CLOUDFLARE_RECORD_NAME}
      PROXIED: "true"
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── PostgreSQL — app metadata DB ───────────────────────────────────────────
  db-app:
    image: postgres:16-alpine
    container_name: apollo-sfs-postgresql-app
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_APP_USER}
      POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD}
      POSTGRES_DB: ${POSTGRES_APP_DB}
    volumes:
      - ./docker/postgresql-app:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_APP_USER} -d ${POSTGRES_APP_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── PostgreSQL — Keycloak DB ───────────────────────────────────────────────
  db-keycloak:
    image: postgres:16-alpine
    container_name: apollo-sfs-postgresql-keycloak
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_KC_USER}
      POSTGRES_PASSWORD: ${POSTGRES_KC_PASSWORD}
      POSTGRES_DB: ${POSTGRES_KC_DB}
    volumes:
      - ./docker/postgresql-keycloak:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_KC_USER} -d ${POSTGRES_KC_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app-network:
    driver: bridge

volumes:
  # Bind-mounted to the NVMe drive — this is where uploaded file blobs live.
  # The host directory must exist before `docker compose up`:
  #   sudo mkdir -p /minio/nvme-1/data
  minio-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /minio/nvme-1/data

