## apollo-sfs — Maddy SMTP relay configuration
##
## Role: internal submission hub only.
## The Go API and Keycloak submit mail here on port 587 (Docker network).
## Maddy relays everything outbound through SendGrid — no direct MX delivery.
##
## {env:VAR} is substituted at runtime from the container environment.

hostname "apollo-sfs.com"
state_dir /data
runtime_dir /run/maddy

log stderr

## ── Outbound relay — SendGrid ──────────────────────────────────────────────
##
## All mail is forwarded to SendGrid on port 587 with STARTTLS.
## SendGrid username is always the literal string "apikey".
## SENDGRID_SMTP_PASSWORD is injected from the container environment.
##
## Maddy maintains a persistent on-disk queue under state_dir and retries
## failed submissions to SendGrid with exponential backoff automatically.

target.smtp "sendgrid" {
    host "smtp.sendgrid.net"
    port 587

    starttls yes
    require_tls yes

    auth plain "apikey" "{env:SENDGRID_SMTP_PASSWORD}"
}

## ── SMTP submission — port 587, internal Docker network only ──────────────
##
## Accepts submissions from the Go API and Keycloak.
## TLS is disabled on the listening side — the Docker bridge network is a
## private, isolated environment so in-transit encryption is not needed here.
## No SASL auth is required for the same reason: the network itself is the
## trust boundary. Maddy is never exposed to the host or the internet.

smtp tcp://0.0.0.0:587 {
    tls off

    # Route all mail to the SendGrid relay — no local delivery
    default_destination {
        deliver_to &sendgrid
    }
}
