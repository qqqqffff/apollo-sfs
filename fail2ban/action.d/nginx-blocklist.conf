[Definition]
# Bans an IP by appending a deny directive to the nginx blocklist file,
# reloading nginx, and recording the event in the banned_ips PostgreSQL table.
# Works at the nginx layer rather than iptables — required when Cloudflare
# proxies all connections (iptables would block Cloudflare edge IPs, not the
# real attacker).

actionstart = touch /etc/nginx/blocklist.d/auto-blocked.conf

actionban   = echo "deny <ip>;" >> /etc/nginx/blocklist.d/auto-blocked.conf
              nginx -s reload
              /opt/apollo-sfs/scripts/record-ban.sh "<ip>" ban "<name>"

# Remove the exact deny line using a temp-file swap to avoid truncating the
# file mid-read, then reload nginx and mark the IP unbanned in the DB.
actionunban = f=/etc/nginx/blocklist.d/auto-blocked.conf;
              grep -vF "deny <ip>;" "$f" > "$f.tmp" && mv "$f.tmp" "$f";
              nginx -s reload;
              /opt/apollo-sfs/scripts/record-ban.sh "<ip>" unban "<name>"

[Init]
name = nginx-api-scan
